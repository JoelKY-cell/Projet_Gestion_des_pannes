{% extends 'base_generic.html' %}

{% block content %}
<div class="container mt-5">
    <h1 class="text-center mb-4">Liste des maintenanciers</h1>
    <table class="table table-striped table-hover">
        <thead class="thead-dark">
            <tr>
                <th>Nom du maintenancier</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for user in users %}
            <tr>
                <td>{{ user.username }}</td>
                <td>
                    <a href="{% url 'modify_user' user.id %}" class="btn btn-sm btn-primary">
                        <i class="fas fa-edit"></i> Modifier
                    </a>
                    <a href="{% url 'delete_user' user.id %}" class="btn btn-sm btn-danger">
                        <i class="fas fa-trash-alt"></i> Supprimer
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>

{% endblock %}
