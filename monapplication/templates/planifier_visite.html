{% extends 'base_generic.html' %}
{% block content %}
<div class="container mt-5">
    <h2 class="text-center mb-4">Planifier une visite de maintenance</h2>

    <form method="POST" class="mx-auto" style="max-width: 600px;">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Planifier</button>
    </form>

    {% if messages %}
        <div class="mt-3">
            {% for message in messages %}
                <div class="toast show text-bg-success">{{ message }}</div>
            {% endfor %}
        </div>
    {% endif %}
</div>
{% endblock %}
