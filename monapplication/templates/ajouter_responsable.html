{% extends 'base_generic.html' %}

{% block content %}
<div class="container mt-5">
    <h2 class="text-center mb-4">Ajouter un Responsable d'Agence</h2>
    <div class="form-container mx-auto" style="max-width: 700px;">
        <form method="post" id="responsableForm" action="{% url 'ajouter_responsable' %}">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100 mt-3">Enregistrer</button>
        </form>
    </div>
</div>

<!-- Toasts -->
<div id="successToast" class="toast align-items-center text-bg-success border-0" role="alert">
    <div class="d-flex">
        <div class="toast-body">Responsable d'agence ajouté avec succès !</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
</div>

<div id="alertToast" class="toast align-items-center text-bg-danger border-0" role="alert">
    <div class="d-flex">
        <div class="toast-body">Erreur lors de l'ajout du responsable.</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
</div>

<script>
    document.querySelector('#responsableForm').addEventListener('submit', function(event) {
        event.preventDefault();
        var form = this;
        var formData = new FormData(form);

        fetch(form.action, {
            method: 'POST',
            body: formData,
            headers: { 'X-Requested-With': 'XMLHttpRequest' }
        })
        .then(response => response.json())
        .then(data => {
            var toast = new bootstrap.Toast(
                data.success ? document.getElementById('successToast') : document.getElementById('alertToast')
            );
            toast.show();
            if (data.success) form.reset();
        })
        .catch(() => new bootstrap.Toast(document.getElementById('alertToast')).show());
    });
</script>
{% endblock %}
