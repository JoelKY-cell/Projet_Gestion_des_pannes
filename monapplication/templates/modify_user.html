{% extends 'base_generic.html' %}

{% block content %}
<div class="container mt-4">
    <h2 class="text-primary text-center">Modifier l'utilisateur : {{ user.username }}</h2>

    <form method="post" class="mt-4" style="max-width: 600px; margin: auto;">
        {% csrf_token %}
        {{ form.as_p }}
        
        <div class="d-flex justify-content-between">
            <button type="submit" class="btn btn-success">Enregistrer</button>
            <button type="button" onclick="window.location.href='{% url 'user_list' %}'" class="btn btn-secondary" style="background-color: green; color: white;">
                Retour
            </button>
        </div>
    </form>
</div>
{% endblock %}
