{% extends 'base_responsable.html' %}
{% block content %}
<div class="container mt-5">
    <h2 class="text-center mb-4">Visites planifiées pour mon agence</h2>

    {% if visites %}
    <table class="table table-striped table-bordered text-center">
        <thead class="table-dark">
            <tr>
                <th>Date</th>
                <th>Objectif</th>
            </tr>
        </thead>
        <tbody>
            {% for visite in visites %}
            <tr>
                <td>{{ visite.date_visite}}</td>
                <td>{{ visite.objet }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    {% else %}
        <p class="text-center">Aucune visite prévue pour votre agence.</p>
    {% endif %}
</div>
{% endblock %}
