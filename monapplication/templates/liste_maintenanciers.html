{% extends 'base_generic.html' %}

{% block content %}
<div class="container mt-5">
    <h1 class="text-center mb-4">Liste des maintenanciers</h1>
    <table class="table table-striped table-hover">
        <thead class="thead-dark">
            <tr>
                <th>Nom du maintenancier</th>
                <th>Prénom </th>
                <th>Nom d'utilisateur</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for agent in agents %}
            <tr>
                <td>{{ agent.user.first_name }}</td>
                <td> {{ agent.user.last_name }} </td>
                <td>{{ agent.user.username }}</td>
                <td>
                    <a href="{% url 'modify_user' agent.user.id %}" class="btn btn-sm btn-primary">
                        Modifier
                    </a>
                    <a href="{% url 'delete_user' agent.user.id %}" class="btn btn-sm btn-danger">
                        Supprimer
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
