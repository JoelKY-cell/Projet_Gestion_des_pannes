{% extends 'base_generic.html' %}
{% block content %}
<div class="container mt-5 text-center">
    <h3>Êtes-vous sûr de vouloir supprimer cette visite ?</h3>

    <p><strong>{{ visite.agence.nom }}</strong> – {{ visite.date|date:"d/m/Y H:i" }}</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Supprimer</button>
        <a href="{% url 'liste_visites_admin' %}" class="btn btn-secondary">Annuler</a>
    </form>
</div>
{% endblock %}
