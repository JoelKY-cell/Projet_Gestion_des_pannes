{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Responsable Panel{% endblock %}</title>

    <!-- Bootstrap & Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet" />

    <style>
        body {
            background-color: var(--bg-color, #fdfdfd);
            color: var(--text-color, #333);
            transition: background-color 0.3s, color 0.3s;
        }

        .dark-mode {
            --bg-color: #1e1e1e;
            --text-color: #f1f1f1;
        }

        .navbar {
            background-color: #008080;
        }

        .navbar a {
            color: white;
        }

        .navbar a:hover {
            color: #ffee00;
        }

        
        .sidebar {
            width: 250px;
            height: 100vh;
            background-color: #009688;
            position: fixed;
            top: 0;
            left: 0;
            padding-top: 20px;
            transition: transform 0.3s;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .sidebar a {
            color: white;
        }

        .sidebar a:hover {
            background-color: #00796b;
        }

        .sidebar.hidden {
            transform: translateX(-100%);
        }

        .main-content {
            margin-left: 250px;
            padding: 20px;
            transition: margin-left 0.3s;
        }

        .main-content.expanded {
            margin-left: 0;
        }
        .logo-footer img {
            max-width: 90%;
            height: auto;
            margin: 10px;
            
        }
        
    </style>
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark">
    <div class="container-fluid justify-content-between">
        <button id="toggle-sidebar" class="btn btn-outline-light"><i class="material-icons">menu</i></button>
        <div class="d-flex align-items-center">
            <a href="{% url 'mon_compte' %}" class="me-3"><i class="material-icons">account_circle</i></a>
            <a href="{% url 'logout' %}" class="text-white"><i class="material-icons">exit_to_app</i></a>
        </div>
    </div>
</nav>

<!-- Sidebar -->
<div class="sidebar" id="sidebar">
    <ul class="nav flex-column">
        <h4 class="text-center fw-bold mb-4">Espace Responsable</h4>
        <li class="nav-item"><a href="{% url 'responsable_dashboard' %}" class="nav-link"><i class="material-icons">home</i> Accueil</a></li>
        <li class="nav-item"><a href="{% url 'signaler_panne_agence' %}" class="nav-link"><i class="material-icons">report_problem</i> Signaler une panne</a></li>
        <li class="nav-item"><a href="{% url 'liste_panne_agence' %}" class="nav-link"><i class="fas fa-tasks"></i> Pannes signalées</a></li>
        <li class="nav-item"><a href="{% url 'liste_visites_agence' %}" class="nav-link text-white"><i class="material-icons">people</i> Liste des visites</a></li>
        <li class="nav-item"><a href="{% url 'notifications' %}" class="nav-link"><i class="material-icons">notifications</i> Mes notifications</a></li>
    </ul>
    
    <div class="logo-footer">
            <img src="{% static 'images/index.jpeg' %}" alt="Logo">
    </div>
</div>

<!-- Contenu principal -->
<main class="main-content">
    {% block content %}{% endblock %}
</main>

<script>
    // Thème sombre
    document.getElementById("toggle-sidebar").addEventListener("click", () => {
        document.getElementById("sidebar").classList.toggle("hidden");
        document.querySelector(".main-content").classList.toggle("expanded");
    });

    if (localStorage.getItem("darkMode") === "enabled") {
        document.body.classList.add("dark-mode");
    }
</script>

</body>
</html>
