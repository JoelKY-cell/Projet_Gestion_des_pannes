{% extends 'base_generic.html' %}

{% block content %}
<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f8f9fa;
    }
    .container {
        margin-top: 50px;
        text-align: center;
    }
    .form-container {
        padding: 20px;
        background-color: white;
        border-radius: 5px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }
</style>

<div class="container">
    <h1>Ajouter une Agence</h1>
    <div class="form-container mx-auto" style="max-width: 700px;">
        <form method="post" id="agenceForm" action="{% url 'ajouter_agence' %}">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary w-100 mt-3">Enregistrer</button>
        </form>
    </div>
</div>

<!-- Notifications -->
<div id="successToast" class="toast align-items-center text-bg-success border-0" role="alert">
    <div class="d-flex">
        <div class="toast-body">Agence ajoutée avec succès !</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
</div>

<div id="alertToast" class="toast align-items-center text-bg-danger border-0" role="alert">
    <div class="d-flex">
        <div class="toast-body">Une erreur est survenue.</div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>
</div>

<script>
    document.querySelector('#agenceForm').addEventListener('submit', function(event) {
        event.preventDefault();
        var form = this;
        var formData = new FormData(form);

        fetch(form.action, { method: 'POST', body: formData, headers: { 'X-Requested-With': 'XMLHttpRequest' } })
        .then(response => response.json())
        .then(data => {
            var toast = new bootstrap.Toast(data.success ? document.getElementById('successToast') : document.getElementById('alertToast'));
            toast.show();
            if (data.success) form.reset();
        })
        .catch(() => new bootstrap.Toast(document.getElementById('alertToast')).show());
    });
</script>
{% endblock %}
