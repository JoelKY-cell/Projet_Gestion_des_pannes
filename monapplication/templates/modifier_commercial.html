{% extends 'base_generic.html' %}

{% block content %}
<h1>Modifier l'Agent Commercial{{ agent.nom }} {{ agent.prenom }}</h1>

<form method="post" action="{% url 'modifier_commercial' agent.pk %}">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Enregistrer les modifications</button>
    <a href="{% url 'agent_liste' %}" class="btn btn-secondary">Annuler</a>
</form>
{% endblock %}
