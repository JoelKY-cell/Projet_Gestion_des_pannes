<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inscription</title>
    {% load static %}
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/5.1.3/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .container {
            max-width: 900px; /* Augmenter la largeur du formulaire */
            background-color: #fff;
            padding: 50px;  /* Augmenter l'espacement interne du formulaire */
            border-radius: 8px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            width: 30%;
            height: 48%;
            text-align: center;
        }

        h2 {
            text-align: center;
            color: #007bff;
        }

        .form-container {
            padding: 30px;  /* Augmenter le padding interne pour plus d'espace */
            background-color: #fff;
            border-radius: 5px;
            
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        .mb-3 {
            margin-bottom: 20px;
        }

        .btn {
            width: 100%;
            padding: 10px;
            font-size: 16px;
        }

        .btn-primary {
            background-color: #007bff;
            border: none;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            background-color: #0056b3;
            cursor: pointer;
        }

        .text-link {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            margin-top: 10px;
        }

        .text-link a {
            color: #007bff;
            text-decoration: none;
        }

        .text-link a:hover {
            text-decoration: underline;
        }

        /* Style pour le logo */
        .logo {
            display: block;
            margin: 0 auto 20px auto; /* Centre le logo et ajoute de l'espace en bas */
            max-width: 150px; /* Ajuste la taille du logo */
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="form-container">
            <!-- Logo ajouté ici -->
            <img src="{% static 'images/index.jpeg' %}" alt="Logo" class="logo">

            <h2>Créer un compte</h2>
            <form method="post" action="{% url 'signup' %}">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-primary">S'inscrire</button>
                
                <div class="text-link">
                    <a href="{% url 'login' %}">Se connecter</a>
                    <a href="{% url 'index' %}">Page d'Accueil</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/5.1.3/js/bootstrap.bundle.min.js"></script>
</body>
</html>
